<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Murder Mystery Party 2026</title>
    <base href="/" />
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="MurderMysteryParty.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>
    <div id="app">Loading... wait for it...</div>
    <script>
        // Set the base href dynamically based on the current location
        // For GitHub Pages: https://byerje.github.io/MMDP2026 -> use /MMDP2026/
        // For local development: http://localhost:5000 -> use /
        const pathname = window.location.pathname;
        const isGitHubPages = window.location.hostname.includes('github.io');
        
        let baseHref = '/';
        if (isGitHubPages && pathname.includes('/MMDP2026')) {
            baseHref = '/MMDP2026/';
        }
        
        document.querySelector('base').setAttribute('href', baseHref);
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
