name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Publish Blazor WebAssembly
        run: dotnet publish MurderMysteryParty/MurderMysteryParty.csproj -c Release -o publish
      - name: Verify base href for GitHub Pages
        run: |
          # Ensure base href is set to /MMDP2026/ (source should already have this value)
          grep -q '<base href="/MMDP2026/" />' publish/wwwroot/index.html || \
            sed -i 's|<base href="/" />|<base href="/MMDP2026/" />|g' publish/wwwroot/index.html
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: publish/wwwroot
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_jekyll: false
